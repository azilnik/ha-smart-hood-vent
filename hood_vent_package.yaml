# Hood Vent Smart Control Package
# ================================
# https://github.com/azilnik/ha-smart-hood-vent
#
# SETUP:
# 1. Add 3 entity IDs to your secrets.yaml (see secrets_example.yaml)
# 2. Copy this file to /config/packages/hood_vent_package.yaml
# 3. Add to configuration.yaml:
#      homeassistant:
#        packages:
#          hood_vent: !include packages/hood_vent_package.yaml
# 4. Restart Home Assistant
#
# That's it. This file reads your device IDs from secrets.yaml automatically.

# ============================================================================
# INPUT NUMBERS - Adjustable thresholds (tune via UI)
# ============================================================================
input_number:
  hood_temp_rise_threshold:
    name: "Hood: Temp Rise Threshold (°/min)"
    min: 0.1
    max: 3.0
    step: 0.1
    initial: 0.5
    unit_of_measurement: "°/min"
    icon: mdi:thermometer-chevron-up

  hood_temp_fall_threshold:
    name: "Hood: Temp Fall Threshold (°/min)"
    min: -0.5
    max: 0.5
    step: 0.05
    initial: 0.1
    unit_of_measurement: "°/min"
    icon: mdi:thermometer-chevron-down

  hood_humidity_rise_threshold:
    name: "Hood: Humidity Rise Threshold (%/min)"
    min: 0.1
    max: 5.0
    step: 0.1
    initial: 1.0
    unit_of_measurement: "%/min"
    icon: mdi:water-percent

  hood_off_delay_minutes:
    name: "Hood: Off Delay (minutes)"
    min: 1
    max: 10
    step: 1
    initial: 2
    unit_of_measurement: "min"
    icon: mdi:timer-outline

# ============================================================================
# INPUT BOOLEANS - Manual override and enable/disable
# ============================================================================
input_boolean:
  hood_automation_enabled:
    name: "Hood: Automation Enabled"
    icon: mdi:robot

  hood_manual_override:
    name: "Hood: Manual Override Active"
    icon: mdi:hand-back-left

# ============================================================================
# TEMPLATE SENSORS - Derivative calculations
# ============================================================================
template:
  - sensor:
      - name: "Kitchen Temp Rate of Change"
        unique_id: kitchen_temp_rate_of_change
        unit_of_measurement: "°/min"
        state_class: measurement
        icon: mdi:chart-line
        state: >
          {{ states('sensor.kitchen_temp_derivative') | float(0) | round(2) }}
        availability: >
          {{ states('sensor.kitchen_temp_derivative') not in ['unknown', 'unavailable'] }}

      - name: "Kitchen Humidity Rate of Change"
        unique_id: kitchen_humidity_rate_of_change
        unit_of_measurement: "%/min"
        state_class: measurement
        icon: mdi:chart-line
        state: >
          {{ states('sensor.kitchen_humidity_derivative') | float(0) | round(2) }}
        availability: >
          {{ states('sensor.kitchen_humidity_derivative') not in ['unknown', 'unavailable'] }}

  - binary_sensor:
      - name: "Stove Activity Detected"
        unique_id: stove_activity_detected
        device_class: heat
        icon: mdi:stove
        state: >
          {% set temp_rate = states('sensor.kitchen_temp_rate_of_change') | float(0) %}
          {% set humidity_rate = states('sensor.kitchen_humidity_rate_of_change') | float(0) %}
          {% set temp_threshold = states('input_number.hood_temp_rise_threshold') | float(0.5) %}
          {% set humidity_threshold = states('input_number.hood_humidity_rise_threshold') | float(1.0) %}
          {{ temp_rate > temp_threshold or humidity_rate > humidity_threshold }}
        delay_off:
          minutes: 1

# ============================================================================
# DERIVATIVE SENSORS - Core rate-of-change calculations
# ============================================================================
sensor:
  - platform: derivative
    source: !secret hood_temperature_sensor
    name: "Kitchen Temp Derivative"
    unit_time: min
    time_window: "00:02:00"
    round: 2

  - platform: derivative
    source: !secret hood_humidity_sensor
    name: "Kitchen Humidity Derivative"
    unit_time: min
    time_window: "00:02:00"
    round: 2

  - platform: statistics
    name: "Kitchen Temp Stats (10min)"
    entity_id: !secret hood_temperature_sensor
    state_characteristic: change
    max_age:
      minutes: 10

# ============================================================================
# AUTOMATIONS
# ============================================================================
automation:
  - id: hood_vent_auto_on
    alias: "Hood Vent: Auto On"
    description: "Turn on hood when temperature or humidity rising quickly"
    trigger:
      - platform: state
        entity_id: binary_sensor.stove_activity_detected
        to: "on"
        for:
          seconds: 30
    condition:
      - condition: state
        entity_id: input_boolean.hood_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.hood_manual_override
        state: "off"
    action:
      - service: switch.turn_on
        target:
          entity_id: !secret hood_switch
      - service: logbook.log
        data:
          name: "Hood Vent"
          message: "Auto ON - Stove activity detected"
          entity_id: !secret hood_switch
    mode: single

  - id: hood_vent_auto_off
    alias: "Hood Vent: Auto Off"
    description: "Turn off hood when temperature rate falls below threshold"
    trigger:
      - platform: template
        value_template: >
          {% set temp_rate = states('sensor.kitchen_temp_rate_of_change') | float(0) %}
          {% set threshold = states('input_number.hood_temp_fall_threshold') | float(0.1) %}
          {{ temp_rate < threshold }}
        for:
          minutes: "{{ states('input_number.hood_off_delay_minutes') | int(2) }}"
    condition:
      - condition: state
        entity_id: !secret hood_switch
        state: "on"
      - condition: state
        entity_id: input_boolean.hood_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.hood_manual_override
        state: "off"
      - condition: state
        entity_id: binary_sensor.stove_activity_detected
        state: "off"
    action:
      - service: switch.turn_off
        target:
          entity_id: !secret hood_switch
      - service: logbook.log
        data:
          name: "Hood Vent"
          message: "Auto OFF - Cooling detected"
          entity_id: !secret hood_switch
    mode: single

  - id: hood_vent_manual_override_on
    alias: "Hood Vent: Detect Manual Override"
    description: "Detect manual control and pause automation temporarily"
    trigger:
      - platform: state
        entity_id: !secret hood_switch
    condition:
      - condition: template
        value_template: "{{ trigger.context.user_id is not none }}"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.hood_manual_override
      - delay:
          minutes: 30
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.hood_manual_override
    mode: restart

  - id: hood_vent_safety_off
    alias: "Hood Vent: Safety Auto Off (Max Runtime)"
    description: "Turn off hood after 2 hours regardless of conditions"
    trigger:
      - platform: state
        entity_id: !secret hood_switch
        to: "on"
        for:
          hours: 2
    action:
      - service: switch.turn_off
        target:
          entity_id: !secret hood_switch
      - service: persistent_notification.create
        data:
          title: "Hood Vent Safety Shutoff"
          message: "Hood turned off after 2 hour maximum runtime"
          notification_id: hood_safety_off
    mode: single
