# Hood Vent — Add these 3 lines to your Home Assistant secrets.yaml
# ================================================================
#
# How to find your entity IDs:
#   1. Open Home Assistant
#   2. Go to Developer Tools → States (or visit /developer-tools/state)
#   3. Search for your temperature sensor, humidity sensor, and hood switch
#   4. Copy the entity IDs (they look like "sensor.kitchen_temperature")
#
# How to edit secrets.yaml:
#   - File Editor add-on: browse to /config/secrets.yaml
#   - SSH/Samba: edit /config/secrets.yaml
#   - If the file doesn't exist, create it in your /config/ directory
#
# More info: https://www.home-assistant.io/docs/configuration/secrets/

hood_temperature_sensor: sensor.YOUR_TEMPERATURE_SENSOR
hood_humidity_sensor: sensor.YOUR_HUMIDITY_SENSOR
hood_switch: switch.YOUR_HOOD_SWITCH
