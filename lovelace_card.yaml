# Hood Vent Dashboard Card
# ========================
#
# BEFORE PASTING: Find-and-replace these 3 values with your entity IDs.
# Use the same values you added to secrets.yaml.
#
#   FIND                              → REPLACE WITH YOUR ENTITY
#   sensor.YOUR_TEMPERATURE_SENSOR    → (e.g., sensor.kitchen_temperature)
#   sensor.YOUR_HUMIDITY_SENSOR       → (e.g., sensor.kitchen_humidity)
#   switch.YOUR_HOOD_SWITCH           → (e.g., switch.switchbot_range_hood)
#
# Then paste into: Dashboard → Edit → Add Card → Manual
#
# NOTE: Requires mini-graph-card from HACS. If you don't have HACS,
# use the simple version at the bottom of this file instead.

type: vertical-stack
cards:
  - type: horizontal-stack
    cards:
      - type: entity
        entity: switch.YOUR_HOOD_SWITCH
        name: Hood Vent
        icon: mdi:fan
      - type: entity
        entity: binary_sensor.stove_activity_detected
        name: Stove Active
      - type: entity
        entity: input_boolean.hood_automation_enabled
        name: Auto Mode

  - type: glance
    title: Current Readings
    entities:
      - entity: sensor.YOUR_TEMPERATURE_SENSOR
        name: Temp
      - entity: sensor.YOUR_HUMIDITY_SENSOR
        name: Humidity
      - entity: sensor.kitchen_temp_rate_of_change
        name: Temp Δ/min
      - entity: sensor.kitchen_humidity_rate_of_change
        name: Humidity Δ/min

  - type: custom:mini-graph-card
    name: Rate of Change (for tuning thresholds)
    hours_to_show: 2
    points_per_hour: 60
    line_width: 2
    entities:
      - entity: sensor.kitchen_temp_rate_of_change
        name: Temp °/min
        color: "#ff6b6b"
        show_fill: false
      - entity: sensor.kitchen_humidity_rate_of_change
        name: Humidity %/min
        color: "#4ecdc4"
        show_fill: false
      - entity: input_number.hood_temp_rise_threshold
        name: ON Threshold
        color: "#ffe66d"
        show_line: true
        show_points: false
        show_fill: false
    show:
      labels: true
      legend: true

  - type: history-graph
    title: Derivative Values (Last 2 Hours)
    hours_to_show: 2
    entities:
      - entity: sensor.kitchen_temp_rate_of_change
        name: Temp Δ/min
      - entity: sensor.kitchen_humidity_rate_of_change
        name: Humidity Δ/min

  - type: history-graph
    title: Absolute Temperature & Humidity
    hours_to_show: 4
    entities:
      - entity: sensor.YOUR_TEMPERATURE_SENSOR
        name: Temperature
      - entity: sensor.YOUR_HUMIDITY_SENSOR
        name: Humidity

  - type: entities
    title: Tuning Thresholds
    show_header_toggle: false
    entities:
      - type: section
        label: ON Triggers (raise to reduce sensitivity)
      - entity: input_number.hood_temp_rise_threshold
        name: Temp rise to turn ON
      - entity: input_number.hood_humidity_rise_threshold
        name: Humidity rise to turn ON
      - type: section
        label: OFF Triggers
      - entity: input_number.hood_temp_fall_threshold
        name: Temp rate below this = cooling
      - entity: input_number.hood_off_delay_minutes
        name: Minutes at low rate before OFF
      - type: section
        label: Overrides
      - entity: input_boolean.hood_automation_enabled
      - entity: input_boolean.hood_manual_override

  - type: logbook
    title: Hood Vent Activity Log
    hours_to_show: 12
    entities:
      - switch.YOUR_HOOD_SWITCH
      - binary_sensor.stove_activity_detected
      - automation.hood_vent_auto_on
      - automation.hood_vent_auto_off


